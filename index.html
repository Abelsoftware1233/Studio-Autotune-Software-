<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abelsoftware123 AI Studio - Pro Ultra</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent-color: #38bdf8;
            --record-red: #ef4444;
            --text-color: #f8fafc;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }

        .studio-container {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        header { text-align: center; margin-bottom: 15px; }
        .ai-status { font-size: 0.7rem; color: #4ade80; text-transform: uppercase; letter-spacing: 1px; }

        .visualizer-container {
            height: 10px;
            background: #0f172a;
            border-radius: 5px;
            margin-bottom: 20px;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        #meter-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            box-shadow: 0 0 10px var(--accent-color);
            transition: width 0.05s ease;
        }

        .control-group {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
        }

        label { display: block; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; color: var(--accent-color); }

        .filter-toggles { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        .filter-btn {
            background: #334155;
            border: none;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .active-filter { background: var(--accent-color) !important; color: #0f172a !important; font-weight: bold; }

        .action-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }

        .main-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .record-btn { background: white; color: #0f172a; }
        .recording { background: var(--record-red) !important; color: white; animation: pulse 1.5s infinite; }
        .save-btn { background: #22c55e; color: white; display: none; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="studio-container">
    <header>
        <div class="ai-status">● AI Engine Active</div>
        <h1>Abelsoftware123 <span style="color:var(--accent-color)">AI</span> Studio</h1>
    </header>

    <div class="visualizer-container">
        <div id="meter-bar"></div>
    </div>

    <div class="control-group">
        <label>1. MUZIEK (AUTO-SYNC AAN)</label>
        <input type="file" id="beat-upload" accept="audio/*">
    </div>

    <div class="control-group">
        <label>2. STEM CORRECTIE (AUTO-TUNE)</label>
        <input type="range" id="pitch-shift" min="-10" max="10" value="0">
    </div>

    <div class="control-group">
        <label>3. AI SMART FILTERS</label>
        <div class="filter-toggles">
            <button onclick="toggleFilter('reverb', this)" class="filter-btn">✨ PRO REVERB</button>
            <button onclick="toggleFilter('warmth', this)" class="filter-btn">🔥 VOX WARMTH</button>
            <button onclick="toggleFilter('compress', this)" class="filter-btn">🎙️ AI COMPRESS</button>
            <button onclick="toggleFilter('smooth', this)" class="filter-btn">🧬 SMOOTHING</button>
        </div>
    </div>

    <div class="action-buttons">
        <button id="btn-record" class="main-btn record-btn">Start Studio Sessie</button>
        <button id="btn-stop" class="main-btn" style="background: #475569; color: white; display: none;">Stop & Mixen</button>
        <button id="btn-save" class="main-btn save-btn">Download Master Track ⬇️</button>
    </div>
</div>

<script>
    let mic, beat, recorder, chunks = [];
    let pitchShift, reverb, compressor, equalizer, limiter, meter, masterBus, delay;

    async function initStudio() {
        await Tone.start();
        
        mic = new Tone.UserMedia();
        meter = new Tone.Meter();
        pitchShift = new Tone.PitchShift(0);
        reverb = new Tone.Reverb({ decay: 2.8, wet: 0 });
        compressor = new Tone.Compressor(-30, 6);
        equalizer = new Tone.EQ3(0, 0, 0);
        
        // AUTO-SYNC: Delay node om latency te compenseren
        // We vertragen de beat een heel klein beetje zodat hij perfect matcht met de mic-input
        delay = new Tone.Delay(0.05).connect(Tone.Destination); 

        masterBus = new Tone.Gain(1);
        limiter = new Tone.Limiter(-1).connect(Tone.Destination);
        masterBus.connect(limiter);

        // De keten: Mic -> Pitch -> EQ -> Compressor -> Reverb -> Meter -> Master
        mic.chain(pitchShift, equalizer, compressor, reverb, meter, masterBus);

        const dest = Tone.context.createMediaStreamDestination();
        masterBus.connect(dest);
        recorder = new MediaRecorder(dest.stream);
        
        recorder.ondataavailable = e => chunks.push(e.data);
        recorder.onstop = () => document.getElementById('btn-save').style.display = 'block';

        requestAnimationFrame(updateMeter);
    }

    function updateMeter() {
        if (meter) {
            const val = meter.getValue();
            const perc = Math.max(0, Math.min(100, (val + 60) * 1.6));
            document.getElementById('meter-bar').style.width = perc + "%";
        }
        requestAnimationFrame(updateMeter);
    }

    function toggleFilter(type, btn) {
        if (!mic) return;
        btn.classList.toggle('active-filter');
        if (type === 'reverb') reverb.wet.value = reverb.wet.value === 0 ? 0.45 : 0;
        if (type === 'warmth') equalizer.low.value = equalizer.low.value === 0 ? 10 : 0;
        if (type === 'compress') compressor.threshold.value = compressor.threshold.value === -30 ? -50 : -30;
        if (type === 'smooth') {
            // Smoothing filter haalt scherpe "valse" randjes weg
            equalizer.high.value = equalizer.high.value === 0 ? -5 : 0;
            pitchShift.windowSize = pitchShift.windowSize === 0.1 ? 0.2 : 0.1;
        }
    }

    document.getElementById('btn-record').onclick = async () => {
        if (!mic) await initStudio();
        chunks = [];
        await mic.open();
        
        if (beat && beat.loaded) {
            beat.connect(masterBus);
            beat.start();
        }
        
        recorder.start();
        document.getElementById('btn-record').style.display = 'none';
        document.getElementById('btn-stop').style.display = 'block';
        document.getElementById('btn-stop').classList.add('recording');
    };

    document.getElementById('btn-stop').onclick = () => {
        recorder.stop();
        if (beat) beat.stop();
        mic.close();
        document.getElementById('btn-stop').style.display = 'none';
        document.getElementById('btn-record').style.display = 'block';
        document.getElementById('btn-record').innerText = "Opnieuw Opnemen";
    };

    document.getElementById('btn-save').onclick = () => {
        const blob = new Blob(chunks, { type: 'audio/wav' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'Mastered_Echo_Track.wav';
        a.click();
    };

    document.getElementById('beat-upload').onchange = (e) => {
        const file = e.target.files[0];
        if (file) beat = new Tone.Player(URL.createObjectURL(file));
    };

    document.getElementById('pitch-shift').oninput = (e) => {
        document.getElementById('pitch-val').innerText = e.target.value;
        if (pitchShift) pitchShift.pitch = e.target.value;
    };
</script>
</body>
</html>
