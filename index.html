<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo AI Studio - Ultimate</title>
    <link rel="stylesheet" href="stijl.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

    <div class="studio-container">
        <header>
            <h1>Echo <span class="ai-text">AI</span> Studio</h1>
            <p>De toekomst van jouw stem.</p>
        </header>

        <main>
            <div class="visualizer-container">
                <div id="meter-bar"></div>
            </div>

            <div class="control-group">
                <label>1. MUZIEK (BEAT)</label>
                <input type="file" id="beat-upload" accept="audio/*">
            </div>

            <div class="control-group">
                <label>2. AUTOTUNE (PITCH: <span id="pitch-val">0</span>)</label>
                <input type="range" id="pitch-shift" min="-12" max="12" value="0" step="1">
            </div>

            <div class="control-group">
                <label>3. AI STUDIO FILTERS</label>
                <div class="filter-toggles">
                    <button id="filter-reverb" class="filter-btn">✨ REVERB</button>
                    <button id="filter-warmth" class="filter-btn">🔥 WARMTH</button>
                    <button id="filter-compress" class="filter-btn">🎙️ COMPRESS</button>
                    <button id="filter-bright" class="filter-btn">💎 BRIGHT</button>
                </div>
            </div>

            <div class="action-buttons">
                <button id="btn-record" class="main-btn record-off">Opname Starten</button>
                <button id="btn-stop" class="main-btn" disabled>Stop & Opslaan</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
